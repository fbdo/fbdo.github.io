baseURL = "https://fbdo.github.io/"
title = "fabiooliveira"

locale = "en"
defaultContentLanguage = "en"

enableEmoji = true

# Preserve existing .html URLs from the previous site
uglyURLs = true
canonifyURLs = true

# Theme is consumed as a Hugo Module instead of a git submodule
[module]
  [[module.imports]]
    path = "github.com/luizdepra/hugo-coder"

# Google Analytics 4. Hugo's internal google_analytics.html template (invoked
# by the theme's baseof.html) renders the GA4 gtag.js snippet and only fires on
# production builds — local `hugo server` runs are not tracked.
[services.googleAnalytics]
  ID = "G-V2C1LXBZJ3"

[pagination]
  pagerSize = 20

[markup]
  [markup.highlight]
    style = "b2"
    noClasses = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true

[params]
    author = "Fabio Oliveira"
    description = "Fabio Oliveira's personal website"
    keywords = "freelancer,architect,blog,developer,personal,software,cloud,agile,devops"
    info = ["Solution Architect, Cloud, Agile Coach, DevOps, Polyglot Software Engineer and everything else..."]
    avatarURL = "images/fabio.jpeg"
    footerContent = "Not always right, but always learning"

    dateFormat = "January 2, 2006"
    since = 2019

    hideCredits = false
    hideCopyright = false
    colorScheme = "auto"

    # Git Commit in Footer
    commit = "https://github.com/fbdo/fbdo.github.io/tree/"

    rtl = false

    # Comments via giscus (GitHub Discussions). Theme follows the site's
    # light/dark colorscheme via the `colorscheme` localStorage key.
    [params.giscus]
        repo = "fbdo/fbdo.github.io"
        repoID = "MDEwOlJlcG9zaXRvcnkxNjQwMTU4MTE="
        category = "General"
        categoryID = "DIC_kwDOCcauw84C_3Vt"
        mapping = "pathname"
        reactionsEnabled = "1"
        inputPosition = "bottom"
        theme = "preferred_color_scheme"
        lang = "en"
        loading = "lazy"

    # Custom CSS — note: also declared under [languages.en.params] because the
    # language params block shadows root [params] for the active language.
    customCSS = ["css/contact-form.css", "css/external-posts.css", "css/book.css"]

[[params.social]]
    name = "Github"
    icon = "fa-brands fa-github fa-2x"
    weight = 1
    url = "https://github.com/fbdo/"
[[params.social]]
    name = "Twitter"
    icon = "fa-brands fa-x-twitter fa-2x"
    weight = 3
    url = "https://twitter.com/fbdo/"
[[params.social]]
    name = "LinkedIn"
    icon = "fa-brands fa-linkedin fa-2x"
    weight = 4
    url = "https://www.linkedin.com/in/fabiobragaoliveira/"
[[params.social]]
    name = "Bluesky"
    icon = "fa-brands fa-bluesky fa-2x"
    weight = 2
    url = "https://bsky.app/profile/fabiooliveira.eurosky.social"

[languages]
    [languages.en]
        label = "English"
        title = "Fabio Oliveira"

        [languages.en.params]
        author = "Fabio Oliveira"
        info = ["Solution Architect, Cloud, Agile Coach, DevOps, Polyglot Software Engineer and everything else..."]
        description = "Fabio Oliveira's personal website"
        keywords = "blog,developer,personal"
        customCSS = ["css/contact-form.css", "css/external-posts.css", "css/book.css"]

        [languages.en.menu]

        [[languages.en.menu.main]]
        name = "Blog"
        weight = 1
        url = "/posts/"

        [[languages.en.menu.main]]
        name = "Book"
        weight = 2
        url = "/book.html"

        [[languages.en.menu.main]]
        name = "Projects"
        weight = 3
        url = "https://github.com/fbdo?tab=repositories"

        [[languages.en.menu.main]]
        name = "Contact me"
        weight = 4
        url = "/contact.html"

        [[languages.en.menu.main]]
        name = "GPG Key"
        weight = 5
        url = "/gpg/fabio.braga-public.key"
